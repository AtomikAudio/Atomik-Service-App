name: Keep Render API warm

# Render free web services spin down after ~15 min idle, causing 30-60s cold
# starts that make the mobile app's login time out. This pings /health on a
# schedule so the instance stays awake during testing hours.

on:
  schedule:
    # Every 10 minutes (GitHub may delay scheduled runs under load).
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 https://atomik-api.onrender.com/health || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is awake."
              exit 0
            fi
            sleep 15
          done
          echo "API did not return 200 after retries (cold start may still be in progress)."
          exit 0
